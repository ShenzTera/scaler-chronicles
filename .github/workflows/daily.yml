# ─────────────────────────────────────────────────────────────
# The Scaler Chronicles — Daily Auto-Generate & Deploy
#
# Runs every day at 06:00 UTC (adjust the cron to your timezone).
# Also runs on every push to main (for testing).
#
# Secrets required (Settings → Secrets → Actions):
#   NEWS_API_KEY        — from https://newsapi.org
#   UNSPLASH_KEY        — from https://unsplash.com/oauth/applications
#   CLOUDFLARE_API_TOKEN — Cloudflare API token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — found in Cloudflare dashboard → right sidebar
# ─────────────────────────────────────────────────────────────
name: Daily Edition

on:
  schedule:
    # 06:00 UTC every day — adjust to your preferred time
    # Use https://crontab.guru to convert to your timezone
    - cron: '0 6 * * *'
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from the Actions tab

permissions:
  contents: write      # needed to commit archive JSON files back to the repo

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:

      # 1. Check out the repo (with full history so we can push back)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Generate today's edition
      - name: Generate edition
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}
        run: node scripts/generate.js

      # 5. Commit the new archive JSON + updated index.html back to the repo
      #    so tomorrow's build can read today's archive.
      - name: Commit archive & built site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --cached --quiet || git commit -m "chore: auto-publish $(date -u +'%Y-%m-%d') edition"
          git push

      # 6. Deploy to Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=scaler-chronicles --commit-dirty=true
